name: EPG Cron Update

on:
  push:
    branches:
      - epg
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'push' &&
        contains(github.event.head_commit.message, '[update epg]')
      )

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          check-latest: true

      - name: Setup Dev Proxy
        id: setup-devproxy
        uses: dev-proxy-tools/actions/setup@v1
        with:
          version: v1.0.0

      - name: Start EPG
        env:
          PROXY_URL: ${{ steps.setup-devproxy.outputs.proxy-url }}
        run: |
          chmod +x ./start.sh
          ./start.sh

      - name: Commit updated EPG contents
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Chore: Update EPG Content"
          branch: epg
